[[themes]]
name = "matugen_theme"
[themes.palette]
background = "#{{colors.surface.default.hex_stripped}}"
foreground = "#{{colors.on_surface.default.hex_stripped}}"
primary = "#{{colors.primary.default.hex_stripped}}"
secondary = "#{{colors.secondary.default.hex_stripped}}"
error = "#{{colors.error.default.hex_stripped}}"
warning = "#{{colors.error_container.default.hex_stripped}}"

[themes.component_style]
block_title = { fg = "#{{colors.primary.default.hex_stripped}}", modifiers = ["Bold"] }
border = { fg = "#{{colors.primary.default.hex_stripped}}" }
playback_track = { fg = "#{{colors.primary.default.hex_stripped}}", modifiers = ["Bold"] }
playback_artists = { fg = "#{{colors.secondary.default.hex_stripped}}" }
playback_album = { fg = "#{{colors.on_surface.default.hex_stripped}}", modifiers = ["Italic"] }
playback_progress_bar = { bg = "#{{colors.surface.default.hex_stripped}}", fg = "#{{colors.primary.default.hex_stripped}}" }
current_playing = { fg = "#{{colors.primary.default.hex_stripped}}", modifiers = ["Bold"] }
selection = { bg = "#{{colors.primary.default.hex_stripped}}", fg = "#{{colors.surface.default.hex_stripped}}", modifiers = ["Bold"] }
