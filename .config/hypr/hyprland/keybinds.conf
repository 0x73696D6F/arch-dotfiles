exec = hyprctl dispatch submap global

# ──────────────────────────────────────────────
# LAUNCHER & SYSTEM
# ──────────────────────────────────────────────

# App Launcher
bind = Super, space, exec, pkill -9 rofi & ~/.config/rofi/launchers/type-1/launcher.sh

# Power Menu
bind = $kbSession, exec, ~/.config/rofi/powermenu/type-1/powermenu.sh

# Lock Screen
bind = $kbRestoreLock, exec, hyprlock

# Sleep
bindl = Super+Shift, L, exec, systemctl suspend-then-hibernate

# Reload Waybar
bind = SUPER, R, exec, ~/.config/waybar/launch.sh

# Keybinds
bind = Super, K, exec, ~/.local/bin/keybinds_hint.sh

# Wallpaper Picker
bind = Super+Shift, W, exec, ~/.local/bin/wallpaper-picker.sh

# Color Picker
bind = Super, Print, exec, hyprpicker -a

# Layout Toggle
bind = Super, L, exec, ~/.config/hypr/scripts/toggle_layout.sh

# ──────────────────────────────────────────────
# APPS
# ──────────────────────────────────────────────

# Terminal
bind = $kbTerminal, exec, $terminal fish

# Browser
bind = $kbBrowser, exec, $browser

# Editor
bind = $kbEditor, exec, $editor

# File Explorer
bind = $kbFileExplorer, exec, $fileExplorer

# Obsidian
bind = Super+Shift, O, exec, obsidian

# Spotify
bind = Super+Shift, S, exec, pkill spotify_player; kitty --class spotify_player_term -e spotify_player

# Discord
bind = Super+Shift, D, exec, discord

# ──────────────────────────────────────────────
# QUICK BROWSER LINKS
# ──────────────────────────────────────────────

# Remarkable
bind = Super+Shift, R, exec, $browser --url https://my.remarkable.com

# GitHub
bind = Super+Shift, G, exec, $browser --url https://github.com

# YouTube
bind = Super+Shift, Y, exec, $browser --url https://youtube.com

# ──────────────────────────────────────────────
# CLIPBOARD
# ──────────────────────────────────────────────

# Open Clipboard History
bind = SUPER, V, exec, bash -c "cliphist list | rofi -dmenu -i -p 'Cliphist' -theme-str 'window {width: 1000px;} listview {lines: 10;}' -theme ~/.config/rofi/launchers/type-1/style-3 | cliphist decode | wl-copy"
# Wipe Clipboard History
bind = Super+Shift+Alt, V, exec, cliphist wipe

# ──────────────────────────────────────────────
# SCREENSHOT
# ──────────────────────────────────────────────

# Fullscreen Screenshot
bind = , Print, exec, grim - | swappy -f - -o ~/Pictures/Screenshots/

# Region Screenshot (edit)
bind = Super+Shift, Print, exec, grim -g "$(slurp)" - | swappy -f - -o ~/Pictures/Screenshots/

# Region Screenshot (copy to clipboard)
bind = Super+Shift+Alt, Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Area copiata negli appunti"

# ──────────────────────────────────────────────
# SCREEN RECORDING
# ──────────────────────────────────────────────

# Record Screen + Audio
bind = Super+Alt, R, exec, notify-send "Rec" "Rec screen and audio" && gpu-screen-recorder -w screen -f 60 -a "$(pactl get-default-sink).monitor" -o ~/Videos/recording_$(date +%Y-%m-%d_%H-%M-%S).mp4

# Record Screen (no audio)
bind = Ctrl+Alt, R, exec, notify-send "Rec" "Rec screen and NO audio" && gpu-screen-recorder -w screen -f 60 -o ~/Videos/recording_$(date +%Y-%m-%d_%H-%M-%S).mp4

# Record Region
bind = Super+Shift+Alt, R, exec, notify-send "Rec" "Rec selected region" && gpu-screen-recorder -w "$(slurp)" -f 60 -o ~/Videos/recording_$(date +%Y-%m-%d_%H-%M-%S).mp4

# Stop Recording
bind = Super+Alt, K, exec, pkill -f -INT gpu-screen-recorder && notify-send "Rec" "Saved in ~/Videos"

# ──────────────────────────────────────────────
# AUDIO & BRIGHTNESS
# ──────────────────────────────────────────────

# Mute Mic
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Mute Speaker
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Mute Speaker (manual)
bindl = Super+Shift, M, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Volume Up
bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise

# Volume Down
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower

# Brightness Up
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise --device intel_backlight

# Brightness Down
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower --device intel_backlight

# Clear Notifications
bindl = $kbClearNotifs, exec, swaync-client -C

# ──────────────────────────────────────────────
# WINDOW MANAGEMENT
# ──────────────────────────────────────────────

# Close Window
bind = $kbCloseWindow, killactive,

# Fullscreen
bind = $kbWindowFullscreen, fullscreen, 0

# Fullscreen (no borders)
bind = $kbWindowBorderedFullscreen, fullscreen, 1

# Toggle Float
bind = $kbToggleWindowFloating, togglefloating,

# Center Window
bind = Ctrl+Super, Backslash, centerwindow, 1

# Resize & Center Window
bind = Ctrl+Super+Alt, Backslash, resizeactive, exact 55% 70%
bind = Ctrl+Super+Alt, Backslash, centerwindow, 1

# Move Window (mouse)
bindm = Super, mouse:272, movewindow

# Move Window (keyboard)
bindm = $kbMoveWindow, movewindow

# Resize Window (mouse)
bindm = Super, mouse:273, resizewindow

# Resize Window (keyboard)
bindm = $kbResizeWindow, resizewindow

# ──────────────────────────────────────────────
# WINDOW FOCUS
# ──────────────────────────────────────────────

# Focus Left
bind = Super, left, movefocus, l

# Focus Right
bind = Super, right, movefocus, r

# Focus Up
bind = Super, up, movefocus, u

# Focus Down
bind = Super, down, movefocus, d

# ──────────────────────────────────────────────
# MOVE WINDOW
# ──────────────────────────────────────────────

# Move Left
bind = Super+Shift, left, movewindow, l

# Move Right
bind = Super+Shift, right, movewindow, r

# Move Up
bind = Super+Shift, up, movewindow, u

# Move Down
bind = Super+Shift, down, movewindow, d

# ──────────────────────────────────────────────
# WINDOW GROUPS
# ──────────────────────────────────────────────

# Cycle Next in Group
binde = $kbWindowGroupCycleNext, cyclenext

# Cycle Prev in Group
binde = $kbWindowGroupCyclePrev, cyclenext, prev

# Change Group Active (forward)
binde = Ctrl+Alt, Tab, changegroupactive, f

# Change Group Active (backward)
binde = Ctrl+Shift+Alt, Tab, changegroupactive, b

# Toggle Group
bind = $kbToggleGroup, togglegroup

# Ungroup Window
bind = $kbUngroup, moveoutofgroup

# Lock Active Group
bind = Super+Shift, Comma, lockactivegroup, toggle

# ──────────────────────────────────────────────
# WORKSPACES - NAVIGATE
# ──────────────────────────────────────────────

$wsaction = ~/.config/hypr/scripts/wsaction.fish

# Go to Workspace 1-10
bind = $kbGoToWs, 1, exec, $wsaction workspace 1
bind = $kbGoToWs, 2, exec, $wsaction workspace 2
bind = $kbGoToWs, 3, exec, $wsaction workspace 3
bind = $kbGoToWs, 4, exec, $wsaction workspace 4
bind = $kbGoToWs, 5, exec, $wsaction workspace 5
bind = $kbGoToWs, 6, exec, $wsaction workspace 6
bind = $kbGoToWs, 7, exec, $wsaction workspace 7
bind = $kbGoToWs, 8, exec, $wsaction workspace 8
bind = $kbGoToWs, 9, exec, $wsaction workspace 9
bind = $kbGoToWs, 0, exec, $wsaction workspace 10

# Previous Workspace
binde = $kbPrevWs, workspace, -1
binde = Super, Page_Up, workspace, -1
bind = Super, mouse_down, workspace, -1

# Next Workspace
binde = $kbNextWs, workspace, +1
binde = Super, Page_Down, workspace, +1
bind = Super, mouse_up, workspace, +1

# Jump -10 Workspaces
bind = Ctrl+Super, mouse_down, workspace, -10

# Jump +10 Workspaces
bind = Ctrl+Super, mouse_up, workspace, +10

# ──────────────────────────────────────────────
# WORKSPACES - GROUPS
# ──────────────────────────────────────────────

# Go to Workspace Group 1-10
bind = $kbGoToWsGroup, 1, exec, $wsaction -g workspace 1
bind = $kbGoToWsGroup, 2, exec, $wsaction -g workspace 2
bind = $kbGoToWsGroup, 3, exec, $wsaction -g workspace 3
bind = $kbGoToWsGroup, 4, exec, $wsaction -g workspace 4
bind = $kbGoToWsGroup, 5, exec, $wsaction -g workspace 5
bind = $kbGoToWsGroup, 6, exec, $wsaction -g workspace 6
bind = $kbGoToWsGroup, 7, exec, $wsaction -g workspace 7
bind = $kbGoToWsGroup, 8, exec, $wsaction -g workspace 8
bind = $kbGoToWsGroup, 9, exec, $wsaction -g workspace 9
bind = $kbGoToWsGroup, 0, exec, $wsaction -g workspace 10

# ──────────────────────────────────────────────
# WORKSPACES - MOVE WINDOW
# ──────────────────────────────────────────────

# Move Window to Workspace 1-10
bind = $kbMoveWinToWs, 1, exec, $wsaction movetoworkspace 1
bind = $kbMoveWinToWs, 2, exec, $wsaction movetoworkspace 2
bind = $kbMoveWinToWs, 3, exec, $wsaction movetoworkspace 3
bind = $kbMoveWinToWs, 4, exec, $wsaction movetoworkspace 4
bind = $kbMoveWinToWs, 5, exec, $wsaction movetoworkspace 5
bind = $kbMoveWinToWs, 6, exec, $wsaction movetoworkspace 6
bind = $kbMoveWinToWs, 7, exec, $wsaction movetoworkspace 7
bind = $kbMoveWinToWs, 8, exec, $wsaction movetoworkspace 8
bind = $kbMoveWinToWs, 9, exec, $wsaction movetoworkspace 9
bind = $kbMoveWinToWs, 0, exec, $wsaction movetoworkspace 10

# Move Window to Workspace Group 1-10
bind = $kbMoveWinToWsGroup, 1, exec, $wsaction -g movetoworkspace 1
bind = $kbMoveWinToWsGroup, 2, exec, $wsaction -g movetoworkspace 2
bind = $kbMoveWinToWsGroup, 3, exec, $wsaction -g movetoworkspace 3
bind = $kbMoveWinToWsGroup, 4, exec, $wsaction -g movetoworkspace 4
bind = $kbMoveWinToWsGroup, 5, exec, $wsaction -g movetoworkspace 5
bind = $kbMoveWinToWsGroup, 6, exec, $wsaction -g movetoworkspace 6
bind = $kbMoveWinToWsGroup, 7, exec, $wsaction -g movetoworkspace 7
bind = $kbMoveWinToWsGroup, 8, exec, $wsaction -g movetoworkspace 8
bind = $kbMoveWinToWsGroup, 9, exec, $wsaction -g movetoworkspace 9
bind = $kbMoveWinToWsGroup, 0, exec, $wsaction -g movetoworkspace 10

# Move Window Prev Workspace
binde = Super+Alt, Page_Up, movetoworkspace, -1
bind = Super+Alt, mouse_down, movetoworkspace, -1
binde = Ctrl+Super+Shift, left, movetoworkspace, -1

# Move Window Next Workspace
binde = Super+Alt, Page_Down, movetoworkspace, +1
bind = Super+Alt, mouse_up, movetoworkspace, +1
binde = Ctrl+Super+Shift, right, movetoworkspace, +1

# Move Window to Special Workspace
bind = Ctrl+Super+Shift, up, movetoworkspace, special:special
bind = Super+Alt, S, movetoworkspace, special:special

# Bring Window from Special Workspace
bind = Ctrl+Super+Shift, down, movetoworkspace, e+0

# ──────────────────────────────────────────────
# SPECIAL WORKSPACES
# ──────────────────────────────────────────────

# Toggle Special Workspace
bind = $kbToggleSpecialWs, togglespecialworkspace, specialws

# System Monitor
bind = $kbSystemMonitor, togglespecialworkspace, sysmon

# Music Player
bind = $kbMusic, togglespecialworkspace, music

# Communication
bind = $kbCommunication, togglespecialworkspace, communication
